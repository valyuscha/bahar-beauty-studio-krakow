[phases.setup]
nixPkgs = ["python39", "nodejs_18"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  "cd frontend && npm install --legacy-peer-deps",
  "cd frontend && npm install --legacy-peer-deps --prefix node_modules/fork-ts-checker-webpack-plugin ajv@6 ajv-keywords@3"
]

[phases.build]
cmds = ["cd frontend && CI=false npm run build"]

[start]
cmd = "bash start.sh"
